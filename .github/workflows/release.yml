name: Release

# Stable release tags only ("v4.2.3", not "v4.2.0-rc1"): prerelease images
# have never been published, and skipping them here keeps the "latest" /
# "alpine" floating tags from ever pointing at an RC.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Each variant publishes ghcr.io/uoregon-libraries/rais with the same
        # tag scheme the Docker Hub images used: vX.Y.Z yields X, X.Y, X.Y.Z
        # and "latest" for debian; X-alpine, X.Y-alpine, X.Y.Z-alpine and
        # "alpine" for alpine.
        include:
          - dockerfile: docker/Dockerfile
            flavor: latest=true
            tags: |
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=semver,pattern={{major}}
          - dockerfile: docker/Dockerfile-alpine
            flavor: |
              latest=false
              suffix=-alpine
            tags: |
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=semver,pattern={{major}}
              type=raw,value=alpine,suffix=
    steps:
      - uses: actions/checkout@v6
        with:
          # The Dockerfiles ADD ./.git and stamp version.Version via
          # `git describe --tags`, so tags and history must be present
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/uoregon-libraries/rais
          flavor: ${{ matrix.flavor }}
          tags: ${{ matrix.tags }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Build from the checkout, not the action's default git context,
          # so the .git directory is available inside the build
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
