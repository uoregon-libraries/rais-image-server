name: Indev images

# Every commit to main republishes the floating "indev" / "indev-alpine"
# tags so the current development state is always pullable without waiting
# for a release. Stable version tags are handled by release.yml.
#
# PRs touching the docker recipes or publishing workflows run the same image
# builds without pushing, so problems surface before merge.
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docker/**"
      - ".github/workflows/indev.yml"
      - ".github/workflows/release.yml"

# Rapid merges to main just need the newest commit's images; cancel any
# still-running build when another push lands. The ref in the group keeps
# PR runs from cancelling main builds (and vice versa).
concurrency:
  group: indev-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: docker/Dockerfile
            tag: indev
          - dockerfile: docker/Dockerfile-alpine
            tag: indev-alpine
    steps:
      - uses: actions/checkout@v6
        with:
          # The Dockerfiles ADD ./.git and stamp version.Version via
          # `git describe --tags`, so tags and history must be present
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      # PR runs never push, so they don't need to authenticate (and fork PRs
      # only get a read-only token anyway)
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/uoregon-libraries/rais
          flavor: latest=false
          tags: type=raw,value=${{ matrix.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Build from the checkout, not the action's default git context,
          # so the .git directory is available inside the build
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
